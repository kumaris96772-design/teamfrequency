<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TF // Titan Command OS v27.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Instrument+Serif:ital@0;1&display=swap');
        
        :root { 
            --p-accent: #a855f7; 
            --border: rgba(255, 255, 255, 0.08); 
            --sidebar-w: 280px; 
            --card-bg: #0d0d0f;
        }

        /* --- LAYOUT FIX: NO OVERLAP --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: #000 !important; 
            color: #fff; 
            display: grid !important;
            grid-template-columns: var(--sidebar-w) 1fr !important;
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            background: #050505; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            height: 100vh; 
        }
        .sb-head { padding: 30px; border-bottom: 1px solid var(--border); font-weight: 800; font-size: 18px; color: var(--p-accent); }
        .group-label { font-size: 10px; font-weight: 800; color: #444; letter-spacing: 2px; padding: 25px 30px 10px; text-transform: uppercase; }
        
        .nav-link { 
            padding: 12px 30px; color: #71717a; cursor: pointer; transition: 0.3s; font-size: 13px; font-weight: 600; 
            display: flex; align-items: center; gap: 12px; border: none; background: none; width: 100%; text-align: left; 
        }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(168, 85, 247, 0.05); }
        .nav-link.active { border-right: 3px solid var(--p-accent); color: var(--p-accent); background: rgba(168, 85, 247, 0.1); }

        /* --- VIEWPORT --- */
        .viewport { flex: 1; overflow-y: auto; padding: 60px; background: radial-gradient(circle at 50% -10%, #130a1d 0%, #000 80%); }
        .view-section { display: none; max-width: 1100px; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 30px; padding: 40px; margin-bottom: 30px; }
        h1 { font-size: 32px; letter-spacing: -2px; margin-bottom: 40px; }
        h1 i { font-family: 'Instrument Serif'; font-style: italic; color: var(--p-accent); }
        
        /* --- ELEMENTS --- */
        label { display: block; font-size: 10px; font-weight: 800; color: var(--p-accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); padding: 16px; border-radius: 12px; color: #fff; margin-bottom: 20px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--p-accent); }
        
        .btn-save { background: #fff; color: #000; border: none; padding: 18px 40px; border-radius: 100px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; }
        .btn-save:hover { background: var(--p-accent); color: #fff; box-shadow: 0 0 40px rgba(168, 85, 247, 0.4); }

        /* --- LISTS --- */
        .item-row { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 15px 25px; border-radius: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        .p-thumb { width: 90px; height: 50px; border-radius: 6px; object-fit: cover; background: #111; margin-right: 15px; border: 1px solid var(--border); }

        /* --- AUTH --- */
        #auth-barrier { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .lock-card { background: #0a0a0c; padding: 50px; border-radius: 40px; border: 1px solid var(--border); text-align: center; width: 400px; box-shadow: 0 0 100px rgba(168, 85, 247, 0.15); }
        
        .hidden { display: none !important; }
        .btn-red { color: #ff4444; background: none; border: none; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. AUTHORIZATION LAYER -->
    <div id="auth-barrier">
        <div class="lock-card">
            <h2 style="font-family:'Instrument Serif'; font-size: 32px;">Command <i>Access</i></h2>
            <p style="color:#444; font-size: 11px; margin: 10px 0 30px; letter-spacing: 3px;">TITAN_OS_V27</p>
            <input type="text" id="admin-user" placeholder="Operator Identity">
            <input type="password" id="admin-key" placeholder="Access Key">
            <button class="btn-save" id="auth-btn">Authorize Session</button>
        </div>
    </div>

    <!-- 2. SIDEBAR NAVIGATION -->
    <aside class="sidebar">
        <div class="sb-head">TEAM <span>FREQ</span></div>
        
        <p class="group-label">Universal Control</p>
        <button class="nav-link" onclick="window.switchView('cloud', this)"><i class="fa-solid fa-cloud"></i> Database Hub</button>
        <button class="nav-link" onclick="window.switchView('styles', this)"><i class="fa-solid fa-palette"></i> Global Styles</button>
        
        <p class="group-label">Global Pages</p>
        <button class="nav-link" onclick="window.switchView('index', this)"><i class="fa-solid fa-house"></i> index.html</button>
        <button class="nav-link" onclick="window.switchView('about', this)"><i class="fa-solid fa-address-card"></i> about.html</button>
        <button class="nav-link" onclick="window.switchView('hosting', this)"><i class="fa-solid fa-server"></i> hosting.html</button>
        <button class="nav-link" onclick="window.switchView('work', this)"><i class="fa-solid fa-briefcase"></i> work.html</button>

        <p class="group-label">Departments</p>
        <button class="nav-link" onclick="window.switchView('minecraft', this)"><i class="fa-solid fa-cube"></i> minecraft.html</button>
        <button class="nav-link" onclick="window.switchView('editing', this)"><i class="fa-solid fa-play"></i> editing.html</button>
        <button class="nav-link" onclick="window.switchView('designing', this)"><i class="fa-solid fa-palette"></i> designing.html</button>
        <button class="nav-link" onclick="window.switchView('scripts', this)"><i class="fa-solid fa-pen-nib"></i> scripts.html</button>
        <button class="nav-link" onclick="window.switchView('discord', this)"><i class="fa-brands fa-discord"></i> discord.html</button>
        <button class="nav-link" onclick="window.switchView('security', this)"><i class="fa-solid fa-shield-halved"></i> security.html</button>

        <p class="group-label">System Intelligence</p>
        <button class="nav-link" onclick="window.switchView('leads', this)"><i class="fa-solid fa-satellite-dish"></i> Client Leads</button>
        <button class="nav-link" onclick="window.switchView('logs', this)"><i class="fa-solid fa-clock-rotate-left"></i> Activity Logs</button>
    </aside>

    <!-- 3. MAIN VIEWPORT -->
    <main class="viewport">
        
        <!-- CLOUD HUB (Universal Table) -->
        <section id="view-cloud" class="view-section">
            <h1>Database <i>Hub</i></h1>
            <div class="card">
                <label>Target Bandwidth</label>
                <select id="cloud-select" onchange="window.loadCloudHub()">
                    <option value="minecraft_portfolio">Minecraft Portfolio</option>
                    <option value="editing_portfolio">Editing Portfolio</option>
                    <option value="designing_portfolio">Designing Portfolio</option>
                    <option value="staff">Staff Members</option>
                    <option value="orders">Client Orders</option>
                </select>
                <div id="cloud-table-root"></div>
            </div>
        </section>

        <!-- STYLE API -->
        <section id="view-styles" class="view-section">
            <h1>Global Design <i>API</i></h1>
            <div class="card">
                <label>Primary Brand Color</label>
                <input type="color" id="api-color" value="#a855f7">
                <label>Global Typography</label>
                <select id="api-font">
                    <option value="'Plus Jakarta Sans'">Jakarta Sans</option>
                    <option value="'Courier New'">Courier (Minecraft)</option>
                    <option value="'Instrument Serif'">Instrument Serif</option>
                </select>
                <button class="btn-save" onclick="window.saveStyles()">Recalibrate Site Skin</button>
            </div>
        </section>

        <!-- UNIVERSAL FILE CONTROLLER (CMS + ASSETS) -->
        <section id="view-cms" class="view-section">
            <h1 id="cms-header">File Control</h1>
            <div class="card">
                <label>Main Headline (H1)</label>
                <input type="text" id="cms-h1">
                <label>Description / Paragraph</label>
                <textarea id="cms-p" rows="3"></textarea>
                <button class="btn-save" onclick="window.saveCMS()">Synchronize Text</button>
            </div>

            <div class="card" id="staff-form" style="display:none;">
                <h3>Add Team Member</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                    <div><label>Name</label><input type="text" id="st-name"></div>
                    <div><label>Role</label><input type="text" id="st-role"></div>
                </div>
                <label>Bio</label><textarea id="st-bio" rows="2"></textarea>
                <label>Photo URL</label><input type="text" id="st-link">
                <button class="btn-save" onclick="window.addStaff()">Sync Member</button>
            </div>

            <div class="card" id="asset-form">
                <h3>Asset Publisher</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                    <div><label>Title</label><input type="text" id="p-title"></div>
                    <div><label>Niche / Category</label><input type="text" id="p-niche"></div>
                </div>
                <label>Image Source URL</label><input type="text" id="p-link">
                <label>Video Redirect Link (Optional)</label><input type="text" id="p-video">
                <button class="btn-save" style="background:var(--p-accent); color:#fff;" onclick="window.publishAsset()">Deploy Signal</button>
            </div>

            <div id="asset-list-render"></div>
        </section>

        <!-- LEADS & LOGS -->
        <section id="view-leads" class="view-section"><div id="leads-root"></div></section>
        <section id="view-logs" class="view-section"><div id="logs-root"></div></section>
    </main>

    <script type="module">
        import { db, logActivity } from './config.js';
        import { doc, setDoc, onSnapshot, collection, addDoc, getDocs, deleteDoc, doc as fireDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let currentAdmin = "";
        let activeFile = "index";
        let cmsUnsubscribe = null;

        // --- AUTH ---
        document.getElementById('auth-btn').addEventListener('click', () => {
            if(document.getElementById('admin-key').value === "TF_786") {
                currentAdmin = document.getElementById('admin-user').value || "Operator";
                document.getElementById('auth-barrier').style.display = 'none';
                logActivity(currentAdmin, "SESSION_START", "Command_Center");
                window.switchView('cloud', document.querySelector('.nav-link'));
            } else { alert("ACCESS_DENIED"); }
        });

        // --- MASTER NAVIGATION ---
        window.switchView = (id, el) => {
            activeFile = id;
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');

            const cmsView = document.getElementById('view-cms');
            const assetForm = document.getElementById('asset-form');
            const staffForm = document.getElementById('staff-form');

            if(id === 'cloud') {
                document.getElementById('view-cloud').classList.add('active');
                window.loadCloudHub();
            } else if(id === 'styles') {
                document.getElementById('view-styles').classList.add('active');
            } else if(id === 'leads') {
                document.getElementById('view-leads').classList.add('active');
                loadLeads();
            } else if(id === 'logs') {
                document.getElementById('view-logs').classList.add('active');
                loadLogs();
            } else {
                cmsView.classList.add('active');
                document.getElementById('cms-header').innerText = id.toUpperCase() + " Control Center";
                
                // Show Staff form only for about.html
                staffForm.style.display = (id === 'about') ? 'block' : 'none';
                assetForm.style.display = (id === 'index' || id === 'about' || id === 'hosting' || id === 'work' || id === 'leads' || id === 'logs') ? 'none' : 'block';

                syncCMS(id);
                loadAssets(id);
            }
        };

        // --- CLOUD HUB LOGIC ---
        window.loadCloudHub = async () => {
            const col = document.getElementById('cloud-select').value;
            const root = document.getElementById('cloud-table-root');
            root.innerHTML = "<p style='color:var(--p-accent)'>Scanning Bandwidth...</p>";
            
            const snap = await getDocs(query(collection(db, col), orderBy("timestamp", "desc")));
            let html = `<table style="width:100%; border-collapse:collapse; margin-top:20px;"><thead><tr><th>Preview</th><th>Identity</th><th>Action</th></tr></thead><tbody>`;
            
            snap.forEach(d => {
                const data = d.data();
                html += `<tr style="border-bottom:1px solid var(--border)">
                    <td style="padding:15px"><img src="${data.link || ''}" class="p-thumb" onerror="this.src='https://via.placeholder.com/70x40'"></td>
                    <td><b>${data.title || data.name || "Unnamed"}</b><br><small style="color:#555">${data.niche || data.role || ''}</small></td>
                    <td style="text-align:right"><button onclick="window.delDoc('${col}','${d.id}','${data.title || data.name}')" class="btn-red">WIPE</button></td>
                </tr>`;
            });
            root.innerHTML = html + `</tbody></table>`;
        };

        // --- CMS & ASSETS ---
        const syncCMS = (id) => {
            if(cmsUnsubscribe) cmsUnsubscribe();
            cmsUnsubscribe = onSnapshot(doc(db, "settings", id), (s) => {
                if(s.exists()){
                    document.getElementById('cms-h1').value = s.data().h1 || "";
                    document.getElementById('cms-p').value = s.data().p || "";
                } else {
                    document.getElementById('cms-h1').value = "";
                    document.getElementById('cms-p').value = "";
                }
            });
        };

        window.saveCMS = async () => {
            await setDoc(doc(db, "settings", activeFile), {
                h1: document.getElementById('cms-h1').value,
                p: document.getElementById('cms-p').value
            });
            logActivity(currentAdmin, "TEXT_SYNC", activeFile);
            alert("Signal Recalibrated!");
        };

        window.publishAsset = async () => {
            const col = activeFile + "_portfolio";
            const data = {
                title: document.getElementById('p-title').value,
                niche: document.getElementById('p-niche').value || "General",
                video: document.getElementById('p-video').value || "#",
                link: document.getElementById('p-link').value,
                timestamp: serverTimestamp()
            };
            await addDoc(collection(db, col), data);
            logActivity(currentAdmin, "ASSET_ADD", data.title);
            alert("Asset Live!"); loadAssets(activeFile);
        };

        window.loadAssets = async (id) => {
            const root = document.getElementById('asset-list-render');
            const col = id + "_portfolio";
            root.innerHTML = "Querying Database...";
            try {
                const snap = await getDocs(query(collection(db, col), orderBy("timestamp", "desc")));
                root.innerHTML = "";
                snap.forEach(d => {
                    const item = d.data();
                    root.innerHTML += `<div class="item-row">
                        <div style="display:flex; align-items:center;"><img src="${item.link}" class="p-thumb"><span><b>${item.title}</b></span></div>
                        <button onclick="window.delDoc('${col}','${d.id}','${item.title}')" class="btn-red">Remove</button>
                    </div>`;
                });
            } catch(e) { root.innerHTML = "<p style='color:#333'>No asset portfolio linked to this file.</p>"; }
        };

        // --- STAFF, LEADS, LOGS ---
        window.addStaff = async () => {
            await addDoc(collection(db, "staff"), {
                name: document.getElementById('st-name').value,
                role: document.getElementById('st-role').value,
                link: document.getElementById('st-link').value,
                desc: document.getElementById('st-bio').value,
                timestamp: serverTimestamp()
            });
            alert("Staff Synced!"); window.switchView('about');
        };

        window.saveStyles = async () => {
            await setDoc(doc(db, "settings", "global_styles"), {
                color: document.getElementById('api-color').value,
                font: document.getElementById('api-font').value
            });
            alert("Studio Skin Synchronized.");
        };

        window.loadLeads = async () => {
            const root = document.getElementById('leads-root');
            const snap = await getDocs(query(collection(db, "orders"), orderBy("timestamp", "desc")));
            root.innerHTML = "";
            snap.forEach(d => {
                const o = d.data();
                root.innerHTML += `<div class="card" style="border-left:5px solid var(--p-accent);">
                    <h3>${o.service}</h3><p>${o.name} (${o.contact})</p><p style="color:#555; margin-top:10px;">"${o.message}"</p>
                    <button onclick="window.delDoc('orders','${d.id}','Lead')" class="btn-red" style="margin-top:20px;">Clear</button>
                </div>`;
            });
        };

        window.loadLogs = async () => {
            const root = document.getElementById('logs-root');
            const snap = await getDocs(query(collection(db, "activity_logs"), orderBy("timestamp", "desc")));
            root.innerHTML = "";
            snap.forEach(d => {
                const l = d.data();
                root.innerHTML += `<div class="item-row" style="font-family:monospace; font-size:11px; opacity:0.6;">
                    <span>[${l.action}] ${l.user} >> ${l.target}</span>
                </div>`;
            });
        };

        window.delDoc = async (c, id, title) => {
            if(confirm("Confirm deletion of " + title + "?")) {
                await deleteDoc(fireDoc(db, c, id));
                logActivity(currentAdmin, "TERMINATE_DATA", title);
                location.reload();
            }
        };
    </script>
</body>
</html>
