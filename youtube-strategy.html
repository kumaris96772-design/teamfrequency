<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Growth Analytics | Elite Studio</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        .yt-nav { background: #1a1a1a; padding: 20px 8%; display: flex; align-items: center; border-bottom: 1px solid #333; }
        .dot { height: 10px; width: 10px; background: #ff0000; border-radius: 50%; margin-right: 10px; }

        .analytics-container { padding: 40px 8%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .stat-card { 
            background: #1e1e1e; border: 1px solid #333; padding: 25px; 
            border-radius: 4px; transition: 0.3s;
        }
        .stat-card:hover { background: #252525; border-color: #ff0000; }
        
        .growth-indicator { color: #2ba640; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        canvas { width: 100%; border-radius: 2px; margin-bottom: 15px; }
        
        h3 { font-size: 16px; margin: 0; font-weight: 600; color: #efefef; }
        .metric-line { height: 2px; width: 100%; background: #333; margin-top: 15px; position: relative; }
        .metric-fill { height: 100%; width: 75%; background: #ff0000; box-shadow: 0 0 10px #ff0000; }
    </style>
</head>
<body>
    <div class="yt-nav"><div class="dot"></div> <b>Elite Studio // Channel Strategist</b></div>
    
    <header style="padding: 60px 8% 20px;">
        <h1 style="font-size: 32px; letter-spacing: -1px;">Channel Performance Logs</h1>
        <p style="color: #aaa;">Data-driven scaling strategies for high-retention content.</p>
    </header>

    <main class="analytics-container" id="growth-gallery"></main>

    <script type="module">
        import { db, applyEliteWatermark } from './config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function load() {
            const snap = await getDocs(query(collection(db, "growth"), orderBy("timestamp", "desc")));
            const container = document.getElementById('growth-gallery');
            snap.forEach(d => {
                const data = d.data();
                const id = `stat-${d.id}`;
                container.innerHTML += `
                    <div class="stat-card">
                        <div class="growth-indicator">↑ 142% Retention Score</div>
                        <canvas id="${id}"></canvas>
                        <h3>${data.title}</h3>
                        <div class="metric-line"><div class="metric-fill"></div></div>
                    </div>`;
                applyEliteWatermark(id, data.link);
            });
        }
        load();
    </script>
</body>
</html>
