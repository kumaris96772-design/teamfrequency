<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TF // Vocal Console</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #080808; color: #fff; }
        .studio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 30px; padding: 120px 8%; }
        
        .console-unit { 
            background: #111; border: 1px solid #222; border-radius: 12px; padding: 25px; 
            border-top: 4px solid var(--purple); position: relative;
        }
        /* VU Meter Animation */
        .vu-meter { height: 40px; display: flex; gap: 4px; align-items: flex-end; margin-bottom: 20px; background: #000; padding: 10px; border-radius: 4px; }
        .vu-bar { width: 6px; background: var(--purple); border-radius: 2px; animation: oscillate 0.6s infinite alternate; }
        @keyframes oscillate { from { height: 10%; opacity: 0.3; } to { height: 100%; opacity: 1; } }

        canvas { width: 100%; border-radius: 8px; opacity: 0.7; border: 1px solid #1a1a1a; }
        h3 { font-family: monospace; font-size: 16px; margin-top: 15px; color: var(--purple); }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo">TF <span>AUDIO</span></a></nav>

    <main class="studio-grid" id="audio-list"></main>

    <script type="module">
        import { db, applyEliteWatermark } from './config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function load() {
            const snap = await getDocs(query(collection(db, "recording"), orderBy("timestamp", "desc")));
            const container = document.getElementById('audio-list');
            snap.forEach((d, i) => {
                const data = d.data();
                const id = `mic-${d.id}`;
                container.innerHTML += `
                    <div class="console-unit">
                        <div class="vu-meter">
                            <div class="vu-bar" style="animation-delay:0.1s"></div><div class="vu-bar" style="animation-delay:0.4s"></div><div class="vu-bar" style="animation-delay:0.2s"></div><div class="vu-bar" style="animation-delay:0.5s"></div>
                        </div>
                        <canvas id="${id}"></canvas>
                        <h3>SESSION_TRACK_${i+1}: ${data.title}</h3>
                    </div>`;
                applyEliteWatermark(id, data.link);
            });
        }
        load();
    </script>
</body>
</html>
