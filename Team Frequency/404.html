<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 // Signal Lost</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .error-wrap { text-align: center; }
        h1 { font-size: clamp(80px, 20vw, 200px); color: var(--purple); letter-spacing: -10px; margin: 0; text-shadow: 0 0 50px rgba(168, 85, 247, 0.4); }
        p { font-family: monospace; color: #444; letter-spacing: 5px; font-weight: 800; margin-bottom: 40px; }
        .glitch-btn { padding: 15px 40px; border: 1px solid #333; color: #fff; text-decoration: none; border-radius: 100px; font-weight: 800; font-size: 11px; transition: 0.3s; }
        .glitch-btn:hover { background: #fff; color: #000; border-color: #fff; }
    </style>
</head>
<body>
    <div class="error-wrap">
        <h1>404</h1>
        <p>SIGNAL_BANDWIDTH_NOT_FOUND</p>
        <a href="index.html" class="glitch-btn">RE-ESTABLISH CONNECTION</a>
    </div>
</body>
</html>
