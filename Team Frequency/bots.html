<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TF // Bot Logic Stream</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0a0a0c; color: #d4d4d4; font-family: 'Consolas', monospace; margin: 0; display: flex; }
        .ide-sidebar { width: 250px; background: #050505; height: 100vh; border-right: 1px solid var(--border); padding: 30px 20px; }
        .editor-main { flex: 1; height: 100vh; overflow-y: auto; padding: 60px 8%; }
        
        .code-block { 
            background: #000; border: 1px solid var(--border); padding: 30px; 
            border-radius: 8px; margin-bottom: 30px; position: relative;
        }
        .code-block:hover { border-color: var(--purple); }
        
        .syntax-purple { color: #a855f7; }
        .syntax-gray { color: #555; }

        canvas { width: 100%; border: 1px solid #111; margin-top: 20px; opacity: 0.8; }
        h3 { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -1px; color: #fff; }
    </style>
</head>
<body>
    <div class="ide-sidebar">
        <h2 style="font-size: 14px; color: var(--purple);">EXPLORER: LOGIC</h2>
        <p style="font-size: 12px; margin-top: 20px; color: #fff;">📄 deploy_core.js</p>
        <p style="font-size: 12px; color: #444;">📄 ticketing_sys.node</p>
    </div>

    <main class="editor-main">
        <p class="syntax-gray">// Synchronizing Bot Infrastructure...</p>
        <h1 style="color:#fff; font-size: 32px;">Logic <span class="syntax-purple">Deployment</span></h1>
        
        <div id="bot-list" style="margin-top: 40px;"></div>
    </main>

    <script type="module">
        import { db, applyEliteWatermark } from './config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function load() {
            const snap = await getDocs(query(collection(db, "bots"), orderBy("timestamp", "desc")));
            const container = document.getElementById('bot-list');
            snap.forEach(d => {
                const data = d.data();
                const id = `logic-${d.id}`;
                container.innerHTML += `
                    <div class="code-block">
                        <span class="syntax-purple">async function</span> <b>Initialize_${data.title.replace(/\s/g, '_')}()</b> {
                            <canvas id="${id}"></canvas>
                            <p class="syntax-gray" style="margin-top:10px;">// Status: Signal_Stable</p>
                        }
                    </div>`;
                applyEliteWatermark(id, data.link);
            });
        }
        load();
    </script>
</body>
</html>
