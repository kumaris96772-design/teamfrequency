<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TF // Aegis Security</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; color: #a855f7; font-family: 'Courier New', monospace; }
        .scanline { width: 100%; height: 2px; background: rgba(168, 85, 247, 0.2); position: fixed; animation: sweep 4s linear infinite; z-index: 10; pointer-events: none; }
        @keyframes sweep { from { top: 0; } to { top: 100%; } }

        .vault-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 120px 8%; }
        .secure-node { 
            border: 1px solid var(--purple); padding: 25px; background: rgba(10, 5, 20, 0.8);
            position: relative; transition: 0.3s;
        }
        .secure-node:hover { box-shadow: 0 0 20px var(--purple); background: #000; }
        .secure-node::after { content: "VERIFIED_AEGIS"; position: absolute; top: -10px; left: 20px; background: #000; padding: 0 10px; font-size: 11px; }

        canvas { width: 100%; filter: hue-rotate(270deg) contrast(1.2) brightness(0.9); border: 1px solid var(--border); }
        .node-info { margin-top: 15px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <nav>
        <a href="index.html" class="logo">TF <span>SECURITY</span></a>
        <div style="font-size:10px; font-weight:800;">STATUS: [ PROTECTED ]</div>
    </nav>

    <main class="vault-grid" id="sec-gallery"></main>

    <script type="module">
        import { db, applyEliteWatermark } from './config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function load() {
            const snap = await getDocs(query(collection(db, "security"), orderBy("timestamp", "desc")));
            const container = document.getElementById('sec-gallery');
            snap.forEach(d => {
                const data = d.data();
                const id = `node-${d.id}`;
                container.innerHTML += `
                    <div class="secure-node">
                        <canvas id="${id}"></canvas>
                        <h3 style="color:#fff; margin:15px 0 5px;">${data.title}</h3>
                        <div class="node-info">> ENCRYPTION_LAYER_6 // ACTIVE</div>
                    </div>`;
                applyEliteWatermark(id, data.link);
            });
        }
        load();
    </script>
</body>
</html>
