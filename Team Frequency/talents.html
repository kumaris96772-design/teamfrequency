<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Specialists // Team Frequency</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .talent-header { padding: 180px 8% 60px; text-align: left; }
        .talent-header h1 { font-size: clamp(40px, 8vw, 100px); letter-spacing: -0.05em; line-height: 0.9; }
        .talent-header h1 i { font-family: var(--font-heading); color: var(--purple); font-style: italic; }

        .talent-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; padding: 0 8% 100px; }
        
        .talent-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 32px; 
            padding: 40px; transition: 0.5s; position: relative; overflow: hidden;
        }
        .talent-card:hover { border-color: #fff; transform: translateY(-10px); }
        
        .avatar-wrap { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(45deg, #111, var(--purple)); border: 2px solid var(--border); margin-bottom: 30px; position: relative; }
        .avatar-wrap::after { content: "LIVE"; position: absolute; bottom: 0; right: 0; background: var(--purple); color: #000; font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; }

        .talent-card h3 { font-size: 28px; margin-bottom: 5px; letter-spacing: -1px; }
        .talent-card h3 i { font-family: var(--font-heading); font-style: italic; color: var(--purple); font-weight: 400; }
        .role-label { font-size: 11px; font-weight: 800; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; display: block; }

        .meter-group { margin-top: 30px; }
        .meter-label { font-size: 10px; color: #555; display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 800; }
        .meter-bg { width: 100%; height: 2px; background: rgba(255,255,255,0.03); border-radius: 10px; position: relative; }
        .meter-fill { height: 100%; background: var(--purple); box-shadow: 0 0 15px var(--purple); transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); }

    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <nav>
        <a href="index.html" class="logo">TF <span>TALENT</span></a>
        <a href="apply.html" class="btn-sync">Join the Signal</a>
    </nav>

    <header class="talent-header">
        <p style="color:var(--purple); font-weight: 800; letter-spacing: 4px;">[ GLOBAL_SPECIALISTS_V3 ]</p>
        <h1>The <i>Processors</i> <br> Behind the Signal.</h1>
    </header>

    <main class="talent-grid" id="talent-root">
        <!-- Team members load dynamically from Firebase -->
    </main>

    <script type="module">
        import { db } from './config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function fetchTalent() {
            const snap = await getDocs(query(collection(db, "talents"), orderBy("timestamp", "asc")));
            const root = document.getElementById('talent-root');
            root.innerHTML = "";

            snap.forEach(d => {
                const data = d.data();
                root.innerHTML += `
                    <div class="talent-card">
                        <div class="avatar-wrap"></div>
                        <span class="role-label">${data.niche || 'Specialist'}</span>
                        <h3>${data.name.split(' ')[0]} <i>${data.name.split(' ')[1] || ''}</i></h3>
                        <p style="color:var(--text-dim); font-size: 14px; margin-top: 15px;">${data.bio}</p>
                        
                        <div class="meter-group">
                            <div class="meter-label"><span>SIGNAL_PURITY</span><span>${data.strength || '99'}%</span></div>
                            <div class="meter-bg"><div class="meter-fill" style="width:${data.strength || '99'}%"></div></div>
                        </div>
                    </div>`;
            });
        }
        fetchTalent();
    </script>
</body>
</html>
