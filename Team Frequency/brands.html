<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brand Solutions // Team Frequency</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .brand-hero { padding: 180px 8% 60px; }
        .brand-hero h1 { font-size: clamp(40px, 8vw, 100px); letter-spacing: -0.05em; }
        .brand-hero h1 i { font-family: var(--font-heading); color: var(--purple); font-style: italic; }

        .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 8% 100px; }
        .metric-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 32px; }
        .metric-card h2 { font-size: 48px; color: var(--purple); margin-bottom: 10px; }
        .metric-card p { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }

        .logo-cloud { padding: 80px 8%; text-align: center; border-top: 1px solid var(--border); }
        .cloud-flex { display: flex; flex-wrap: wrap; justify-content: center; gap: 60px; margin-top: 50px; opacity: 0.4; filter: grayscale(1); }
        .cloud-flex div { font-weight: 800; font-size: 24px; color: #555; }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <nav>
        <a href="index.html" class="logo">TF <span>BRANDS</span></a>
        <a href="index.html#proposal" class="btn-sync">Partner with us</a>
    </nav>

    <header class="brand-hero">
        <p style="color:var(--purple); font-weight: 800; letter-spacing: 3px; margin-bottom: 20px;">[ FOR_PARTNERS ]</p>
        <h1>Connect your <i>Product</i> <br> with Elite Creators.</h1>
    </header>

    <section class="metric-grid">
        <div class="metric-card"><h2>15M+</h2><p>Monthly Impressions</p></div>
        <div class="metric-card"><h2>84%</h2><p>Average Retention</p></div>
        <div class="metric-card"><h2>Gen-Z</h2><p>Primary Audience</p></div>
    </section>

    <section class="logo-cloud">
        <p style="font-size: 11px; letter-spacing: 3px; color: #333;">PREVIOUS SIGNAL MATCHES</p>
        <div class="cloud-flex">
            <div>GAMING_HARDWARE</div>
            <div>ENERGY_DRINK</div>
            <div>SERVER_HOST</div>
            <div>VPN_SERVICE</div>
        </div>
    </section>

    <section style="padding: 100px 8%; text-align: center;">
        <h2 style="font-size: 50px; letter-spacing: -2px; margin-bottom: 30px;">Ready to <i>Scale?</i></h2>
        <a href="index.html#proposal" class="btn-sync" style="padding: 20px 60px;">Request Media Kit</a>
    </section>
</body>
</html>
