<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TF // Department Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; color: #fff; transition: 0.5s; }
        .p-header { padding: 180px 8% 60px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 0 8% 100px; }
        .card { background: #0d0d0f; border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; }
        canvas { width: 100%; border-radius: 15px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">TF <span>CONSOLE</span></a>
        <a href="index.html" class="btn-cta">BACK_TO_HUB</a>
    </nav>

    <header class="p-header">
        <h1 id="live-h1">...</h1>
        <p id="live-p" style="color:#444;"></p>
    </header>

    <main class="grid" id="gallery"></main>

    <script type="module">
        import { db, applyEliteWatermark } from './config.js';
        import { doc, onSnapshot, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🟢 CHANGE THIS PER FILE (e.g., "minecraft", "discord", "editing")
        const PAGE_ID = "minecraft"; 

        // 1. SYNC GLOBAL DESIGN
        onSnapshot(doc(db, "settings", "global_styles"), (s) => {
            if(s.exists()){
                document.documentElement.style.setProperty('--purple', s.data().color);
                document.body.style.fontFamily = s.data().font;
            }
        });

        // 2. SYNC PAGE TEXT
        onSnapshot(doc(db, "settings", PAGE_ID), (s) => {
            if(s.exists()){
                document.getElementById('live-h1').innerHTML = s.data().h1;
                document.getElementById('live-p').innerText = s.data().p;
            }
        });

        // 3. LOAD ASSETS
        async function loadPortfolio() {
            const snap = await getDocs(query(collection(db, PAGE_ID + "_portfolio"), orderBy("timestamp", "desc")));
            const container = document.getElementById('gallery');
            container.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const id = `cvs-${d.id}`;
                container.innerHTML += `
                    <div class="card">
                        <canvas id="${id}"></canvas>
                        <h3 style="margin-top:15px;">${data.title}</h3>
                        <p style="color:var(--purple); font-size:12px;">${data.niche}</p>
                    </div>`;
                applyEliteWatermark(id, data.link);
            });
        }
        loadPortfolio();
    </script>
</body>
</html>
