<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Selected Work // Team Frequency</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .work-header { padding: 180px 8% 60px; }
        .work-header h1 { font-size: clamp(40px, 8vw, 100px); letter-spacing: -0.05em; line-height: 0.9; }
        .work-header h1 i { font-family: var(--font-heading); font-weight: 400; color: var(--purple); }

        /* Filter Pills - High End */
        .work-filters { padding: 20px 8%; display: flex; gap: 10px; overflow-x: auto; position: sticky; top: 80px; z-index: 100; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .f-pill { 
            padding: 10px 25px; border-radius: 100px; border: 1px solid var(--border); 
            background: transparent; color: #555; font-weight: 700; font-size: 12px; 
            cursor: pointer; transition: 0.3s; white-space: nowrap;
        }
        .f-pill.active { background: #fff; color: #000; border-color: #fff; }

        /* Work Grid */
        .work-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; padding: 40px 8% 100px; }
        .work-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 32px; 
            padding: 20px; transition: 0.5s; cursor: pointer; position: relative; overflow: hidden;
        }
        .work-card:hover { border-color: #fff; transform: translateY(-5px); }
        .work-card canvas { width: 100%; border-radius: 20px; display: block; margin-bottom: 20px; }
        .work-info { padding: 10px 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .work-info h3 { font-size: 24px; letter-spacing: -1px; margin: 0; }
        .work-info p { color: var(--text-dim); font-size: 12px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        #work-loader { text-align: center; padding: 100px; color: var(--purple); font-weight: 800; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <nav>
        <a href="index.html" class="logo">TEAM <span>FREQUENCY</span></a>
        <a href="order.html" class="btn-sync">Establish Sync</a>
    </nav>

    <header class="work-header">
        <p style="color:var(--purple); font-weight: 800; letter-spacing: 3px; margin-bottom: 20px;">[ ARCHIVE_V8.2 ]</p>
        <h1>Selected <i>Intelligence</i> <br> & Creative Signals.</h1>
    </header>

    <div class="work-filters">
        <button class="f-pill active" onclick="loadWorks('editing', this)">Production</button>
        <button class="f-pill" onclick="loadWorks('designing', this)">Branding</button>
        <button class="f-pill" onclick="loadWorks('minecraft', this)">Infrastructure</button>
        <button class="f-pill" onclick="loadWorks('scripts', this)">Logic</button>
    </div>

    <div id="work-loader">CALIBRATING_GRID...</div>
    <main class="work-grid" id="work-container"></main>

    <script type="module">
        import { db, applyEliteWatermark } from './config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        window.loadWorks = async (cat, btn) => {
            document.querySelectorAll('.f-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');

            const container = document.getElementById('work-container');
            const loader = document.getElementById('work-loader');
            loader.style.display = "block";
            container.innerHTML = "";

            const snap = await getDocs(query(collection(db, cat), orderBy("timestamp", "desc")));
            loader.style.display = "none";

            snap.forEach(d => {
                const data = d.data();
                const card = document.createElement('div');
                card.className = 'work-card';
                card.innerHTML = `
                    <canvas id="cvs-${d.id}"></canvas>
                    <div class="work-info">
                        <div>
                            <p>${cat}</p>
                            <h3>${data.title}</h3>
                        </div>
                        <i class="fas fa-arrow-right" style="color:var(--purple)"></i>
                    </div>
                `;
                card.onclick = () => location.href = `project-viewer.html?id=${d.id}&cat=${cat}`;
                container.appendChild(card);
                applyEliteWatermark(`cvs-${d.id}`, data.link);
            });
        };

        document.addEventListener('DOMContentLoaded', () => loadWorks('editing', document.querySelector('.f-pill')));
    </script>
</body>
</html>
