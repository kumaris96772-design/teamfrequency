<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TF // Community Overwatch</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #050505; color: #a855f7; font-family: monospace; }
        .wall { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 15px; padding: 100px 20px; }
        
        .monitor { 
            background: #000; border: 2px solid #1a1a1a; padding: 10px; position: relative; 
            overflow: hidden; box-shadow: inset 0 0 30px rgba(168,85,247,0.1);
        }
        .monitor:hover { border-color: var(--purple); }
        
        /* Scanline effect */
        .monitor::before { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: repeating-linear-gradient(rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(168,85,247,0.03) 3px); pointer-events: none; }
        
        .rec-label { color: red; font-size: 10px; position: absolute; top: 20px; right: 20px; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        canvas { width: 100%; filter: grayscale(0.5) contrast(1.2) brightness(0.8); }
        h3 { color: #fff; font-size: 14px; margin-top: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo">TF <span>WATCH</span></a></nav>

    <div style="padding: 100px 8% 0;">
        <h1 style="font-size: 32px;">Signal <span style="color:#fff">Monitoring</span></h1>
        <p style="color:#444;">Community management and real-time moderation logs.</p>
    </div>

    <main class="wall" id="monitor-gallery"></main>

    <script type="module">
        import { db, applyEliteWatermark } from './config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function load() {
            const snap = await getDocs(query(collection(db, "community"), orderBy("timestamp", "desc")));
            const container = document.getElementById('monitor-gallery');
            snap.forEach(d => {
                const data = d.data();
                const id = `cam-${d.id}`;
                container.innerHTML += `
                    <div class="monitor">
                        <div class="rec-label">● LIVE_FEED</div>
                        <div style="font-size:9px; margin-bottom:5px;">CHANNEL_ID: ${d.id.substring(0,6)}</div>
                        <canvas id="${id}"></canvas>
                        <h3>${data.title}</h3>
                    </div>`;
                applyEliteWatermark(id, data.link);
            });
        }
        load();
    </script>
</body>
</html>
