<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure Nodes | Team Frequency</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* --- NETWORK HEADER --- */
        .node-header { padding: 180px 8% 60px; }
        .node-header h1 { font-size: clamp(40px, 8vw, 100px); font-weight: 800; letter-spacing: -0.06em; line-height: 0.9; }
        .node-header h1 i { font-family: 'Instrument Serif', serif; font-style: italic; color: var(--purple); font-weight: 400; }

        /* --- LIVE STATUS BAR --- */
        .network-status {
            display: flex; gap: 30px; padding: 20px 8%; background: #09090b;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            font-family: monospace; font-size: 11px; color: #444;
        }
        .status-unit span { color: var(--purple); font-weight: bold; }
        .pulse-dot { display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; margin-right: 5px; box-shadow: 0 0 10px #22c55e; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* --- NODES GRID --- */
        .nodes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 60px 8%; }
        
        .node-card {
            background: #0d0d0f; border: 1px solid var(--border); border-radius: 32px;
            padding: 40px; position: relative; transition: 0.5s;
        }
        .node-card:hover { border-color: #fff; transform: translateY(-10px); }

        .node-card h3 { font-size: 24px; letter-spacing: -1px; margin-bottom: 5px; }
        .node-price { font-size: 40px; font-weight: 800; margin: 20px 0; letter-spacing: -2px; }
        .node-price span { font-size: 14px; color: #444; letter-spacing: 0; }

        .spec-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; color: #71717a; }
        .spec-row b { color: #fff; }

        .ping-box {
            position: absolute; top: 30px; right: 30px;
            font-family: monospace; font-size: 10px; color: var(--purple);
            background: rgba(168, 85, 247, 0.05); padding: 5px 12px; border-radius: 100px;
        }

        .btn-deploy {
            display: block; width: 100%; padding: 18px; border-radius: 100px;
            background: #fff; color: #000; text-align: center; text-decoration: none;
            font-weight: 800; font-size: 13px; margin-top: 30px; transition: 0.3s;
        }
        .btn-deploy:hover { background: var(--purple); color: #fff; box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); }

        .section-label { padding: 40px 8% 0; color: #333; font-weight: 800; font-size: 12px; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>

    <nav>
        <a href="index.html" class="logo">TF <span>INFRA</span></a>
        <a href="index.html#order" class="btn-sync" style="background:transparent; border:1px solid #222; color:#fff; padding:10px 25px; font-size:12px; border-radius:50px; text-decoration:none; font-weight:700;">Establish Sync</a>
    </nav>

    <header class="node-header">
        <p style="color:var(--purple); font-weight: 800; letter-spacing: 3px; margin-bottom: 20px;">[ GLOBAL_NETWORK_V9 ]</p>
        <h1>Signal <i>Infrastructure</i> <br> & Distributed Nodes.</h1>
    </header>

    <div class="network-status">
        <div class="status-unit"><span class="pulse-dot"></span> NETWORK_STATUS: <span>OPTIMIZED</span></div>
        <div class="status-unit">GLOBAL_UPTIME: <span>99.99%</span></div>
        <div class="status-unit">ACTIVE_NODES: <span id="node-count">--</span></div>
    </div>

    <div id="nodes-container">
        <!-- Managed via Admin Panel -->
    </div>

    <footer style="padding: 100px 8% 60px; text-align: center; color: #222; font-size: 12px;">
        &copy; 2026 TEAM FREQUENCY. All systems operational.
    </footer>

    <script type="module">
        import { db } from './config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function loadNodes() {
            const container = document.getElementById('nodes-container');
            const snap = await getDocs(query(collection(db, "hosting"), orderBy("timestamp", "asc")));
            
            document.getElementById('node-count').innerText = snap.size;

            const grouped = {};
            snap.forEach(doc => {
                const data = doc.data();
                const sec = data.section || "General Infrastructure";
                if(!grouped[sec]) grouped[sec] = [];
                grouped[sec].push(data);
            });

            container.innerHTML = "";
            for (const secName in grouped) {
                let sectionHTML = `
                    <div class="section-label">${secName.toUpperCase()} BANDWIDTH</div>
                    <div class="nodes-grid">`;
                
                grouped[secName].forEach(plan => {
                    // Logic to split specs like "RAM:8GB, CPU:4Core"
                    const specsArray = plan.specs ? plan.specs.split(',') : ["Uptime:99.9%", "DDoS:Active"];
                    const specsHTML = specsArray.map(s => {
                        const p = s.split(':');
                        return `<div class="spec-row">${p[0].trim()} <b>${p[1] ? p[1].trim() : '✓'}</b></div>`;
                    }).join('');

                    sectionHTML += `
                        <div class="node-card">
                            <div class="ping-box">LATENCY: ${Math.floor(Math.random() * 15) + 5}MS</div>
                            <h3>${plan.title}</h3>
                            <div class="node-price">${plan.price.split('/')[0]}<span>/${plan.price.split('/')[1] || 'mo'}</span></div>
                            <div class="specs-box">${specsHTML}</div>
                            <a href="${plan.link}" target="_blank" class="btn-deploy">DEPLOY NODE</a>
                        </div>`;
                });

                sectionHTML += `</div>`;
                container.innerHTML += sectionHTML;
            }
        }
        loadNodes();
    </script>
</body>
</html>
