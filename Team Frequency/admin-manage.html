<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TF // Titan Command OS v23.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap');
        :root { --p-accent: #a855f7; --border: rgba(255, 255, 255, 0.08); --sidebar-w: 280px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #000; color: #fff; display: flex; height: 100vh; overflow: hidden; }

        /* --- AUTH --- */
        #auth-barrier { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .lock-card { background: #0d0d0f; padding: 50px; border-radius: 40px; border: 1px solid var(--border); text-align: center; width: 400px; }
        
        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: #050505; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
        .sb-head { padding: 30px; border-bottom: 1px solid var(--border); font-weight: 800; font-size: 18px; color: var(--p-accent); }
        .group-label { font-size: 10px; font-weight: 800; color: #444; letter-spacing: 2px; padding: 25px 30px 10px; text-transform: uppercase; }
        .nav-link { padding: 12px 30px; color: #71717a; cursor: pointer; transition: 0.3s; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 12px; border: none; background: none; width: 100%; text-align: left; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(168, 85, 247, 0.05); }
        .nav-link.active { border-right: 3px solid var(--p-accent); color: var(--p-accent); }

        /* --- MAIN --- */
        .viewport { flex: 1; overflow-y: auto; padding: 60px; background: radial-gradient(circle at 50% -10%, #130a1d 0%, #000 80%); }
        .view-section { display: none; max-width: 1000px; }
        .view-section.active { display: block; }
        .card { background: #0d0d0f; border: 1px solid var(--border); border-radius: 30px; padding: 40px; margin-bottom: 30px; }
        
        label { display: block; font-size: 10px; font-weight: 800; color: var(--p-accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); padding: 16px; border-radius: 12px; color: #fff; margin-bottom: 20px; outline: none; }
        .btn-save { background: #fff; color: #000; border: none; padding: 18px 40px; border-radius: 100px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-save:hover { background: var(--p-accent); color: #fff; box-shadow: 0 0 40px rgba(168, 85, 247, 0.4); }

        .item-row { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 15px 25px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .p-thumb { width: 60px; height: 35px; border-radius: 4px; object-fit: cover; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-barrier"><div class="lock-card"><h2>COMMAND ACCESS</h2><input type="password" id="access-key" style="margin-top:20px" placeholder="Master Key"><button class="btn-save" onclick="window.unlock()">Enter Console</button></div></div>

    <aside class="sidebar">
        <div class="sb-head">TEAM <span>FREQUENCY</span></div>
        
        <p class="group-label">Website Logic</p>
        <button class="nav-link active" onclick="window.switchView('index', this)">index.html</button>
        <button class="nav-link" onclick="window.switchView('hosting', this)">hosting.html</button>
        <button class="nav-link" onclick="window.switchView('work', this)">work.html</button>
        <button class="nav-link" onclick="window.switchView('about', this)">about.html (Staff)</button>

        <p class="group-label">Asset Portfolios</p>
        <button class="nav-link" onclick="window.switchView('minecraft', this)">minecraft.html</button>
        <button class="nav-link" onclick="window.switchView('discord', this)">discord.html</button>
        <button class="nav-link" onclick="window.switchView('editing', this)">editing.html</button>
        <button class="nav-link" onclick="window.switchView('designing', this)">designing.html</button>

        <p class="group-label">Intelligence</p>
        <button class="nav-link" onclick="window.switchView('leads', this)">Client Signals</button>
    </aside>

    <main class="viewport">
        <h1 id="v-title">Command Center</h1>

        <!-- UNIVERSAL CMS & PORTFOLIO TAB -->
        <section id="view-universal" class="view-section active">
            <div class="card">
                <label>Page Main Headline</label><input type="text" id="cms-h1">
                <label>Page Subtext</label><textarea id="cms-p" rows="2"></textarea>
                <button class="btn-save" onclick="window.saveCMS()">Update Live Text</button>
            </div>

            <div class="card" id="portfolio-uploader">
                <h3>Add Portfolio Asset</h3>
                <input type="text" id="p-title" placeholder="Project Title">
                <input type="text" id="p-link" placeholder="Asset Image Link">
                <button class="btn-save" style="background:var(--p-accent); color:#fff;" onclick="window.publishAsset()">Deploy Asset</button>
            </div>
            <div id="asset-list-render"></div>
        </section>

        <!-- STAFF MANAGEMENT TAB (Special for about.html) -->
        <section id="view-staff" class="view-section">
            <div class="card">
                <h3>Add New Team Member</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
                    <div><label>Name</label><input type="text" id="st-name"></div>
                    <div><label>Role</label><input type="text" id="st-role"></div>
                </div>
                <label>Join Date (e.g. March 2024)</label><input type="text" id="st-date">
                <label>Photo/Logo URL</label><input type="text" id="st-link">
                <label>Description (About them)</label><textarea id="st-desc" rows="3"></textarea>
                <label><input type="checkbox" id="st-founder" style="width:auto;"> This is a Founder</label>
                <button class="btn-save" onclick="window.addStaff()">SYNC STAFF MEMBER</button>
            </div>
            <div id="staff-list-render"></div>
        </section>

        <!-- LEADS TAB -->
        <section id="view-leads" class="view-section"><div id="leads-root"></div></section>
    </main>

    <script type="module">
        import { db } from './config.js';
        import { doc, setDoc, onSnapshot, collection, addDoc, getDocs, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let activePage = 'index';
        let unsubscribe = null;

        window.unlock = () => {
            if(document.getElementById('access-key').value === "TF_786") document.getElementById('auth-barrier').style.display='none';
        }

        window.switchView = (id, el) => {
            activePage = id;
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('v-title').innerText = id.toUpperCase() + " Control";

            if(id === 'about') {
                document.getElementById('view-staff').classList.add('active');
                loadStaff();
            } else if(id === 'leads') {
                document.getElementById('view-leads').classList.add('active');
                loadLeads();
            } else {
                document.getElementById('view-universal').classList.add('active');
                syncCMS(id); loadAssets(id);
            }
        };

        const syncCMS = (id) => {
            if(unsubscribe) unsubscribe();
            unsubscribe = onSnapshot(doc(db, "settings", id), (s) => {
                if(s.exists()){
                    document.getElementById('cms-h1').value = s.data().h1 || "";
                    document.getElementById('cms-p').value = s.data().p || "";
                }
            });
        };

        window.saveCMS = async () => {
            await setDoc(doc(db, "settings", activePage), {
                h1: document.getElementById('cms-h1').value,
                p: document.getElementById('cms-p').value
            });
            alert("Site Synchronized!");
        };

        window.publishAsset = async () => {
            const col = activePage + "_portfolio";
            await addDoc(collection(db, col), {
                title: document.getElementById('p-title').value,
                link: document.getElementById('p-link').value,
                timestamp: serverTimestamp()
            });
            alert("Asset Live!"); loadAssets(activePage);
        };

        window.loadAssets = async (id) => {
            const root = document.getElementById('asset-list-render');
            const snap = await getDocs(query(collection(db, id + "_portfolio"), orderBy("timestamp", "desc")));
            root.innerHTML = "";
            snap.forEach(d => {
                root.innerHTML += `<div class="item-row">
                    <div style="display:flex; align-items:center;"><img src="${d.data().link}" class="p-thumb"><span>${d.data().title}</span></div>
                    <button onclick="window.delDoc('${id}_portfolio','${d.id}')" style="color:red; border:none; background:none;">Delete</button>
                </div>`;
            });
        };

        // --- STAFF LOGIC ---
        window.addStaff = async () => {
            await addDoc(collection(db, "staff"), {
                name: document.getElementById('st-name').value,
                role: document.getElementById('st-role').value,
                date: document.getElementById('st-date').value,
                link: document.getElementById('st-link').value,
                desc: document.getElementById('st-desc').value,
                founder: document.getElementById('st-founder').checked,
                timestamp: serverTimestamp()
            });
            alert("Staff Joined!"); loadStaff();
        };

        window.loadStaff = async () => {
            const root = document.getElementById('staff-list-render');
            const snap = await getDocs(query(collection(db, "staff"), orderBy("timestamp", "asc")));
            root.innerHTML = "";
            snap.forEach(d => {
                root.innerHTML += `<div class="item-row">
                    <span><b>${d.data().name}</b> (${d.data().role})</span>
                    <button onclick="window.delDoc('staff','${d.id}')" style="color:red; border:none; background:none;">Remove</button>
                </div>`;
            });
        };

        window.loadLeads = async () => {
            const root = document.getElementById('leads-root');
            const snap = await getDocs(query(collection(db, "orders"), orderBy("timestamp", "desc")));
            root.innerHTML = "";
            snap.forEach(d => {
                const o = d.data();
                root.innerHTML += `<div class="card" style="border-left:5px solid var(--p-accent);">
                    <h3 style="color:var(--p-accent)">${o.service} Request</h3>
                    <p>By: ${o.name} (${o.contact})</p><p style="color:#555">${o.message}</p>
                    <button onclick="window.delDoc('orders','${d.id}')" style="color:red; border:none; background:none; margin-top:10px;">Archive</button>
                </div>`;
            });
        };

        window.delDoc = async (c, id) => {
            if(confirm("Confirm deletion?")) { await deleteDoc(doc(db, c, id)); location.reload(); }
        };
    </script>
</body>
</html>
